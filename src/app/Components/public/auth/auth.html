<div class="login-page">
    <!-- Theme Toggle -->
    <button class="auth-theme-toggle" (click)="themeService.toggle()" title="Toggle theme">
        {{ themeService.isDarkMode() ? '☀️' : '🌙' }}
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">📱 Job Center</div>
                <h2>გამარჯობა</h2>
                <p>შედით თქვენს ანგარიშზე გასაგრძელებლად</p>
            </div>
            @if(loginMode()){
                
                <form class="login-form" [formGroup]="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">ელ-ფოსტა</label>
                        <input formControlName="email" type="email" class="form-control" id="email"
                            placeholder="შეიყვანეთ ელ-ფოსტა" required [class.is-invalid]="isInvalid('email')">
                    </div>
    
                    <div class="mb-3">
                        <label for="password" class="form-label">პაროლი</label>
                        <input formControlName="password" type="password" class="form-control" id="password"
                            placeholder="შეიყვანეთ პაროლი" required [class.is-invalid]="isInvalid('password')">
                    </div>
    
                    <button type="button" (click)="logIn()" class="btn btn-primary btn-login">შესვლა</button>
    
                    <div class="divider">
                        <span>OR</span>
                    </div>
    
                    <div class="signup-link">
                        არ გაქვს ანგარიში? <a (click)="modeChanger()">რეგისტრაცია</a>
                    </div>
                </form>
            }@else{
                <form class="login-form" [formGroup]="registerForm">
                    <div class="mb-3">
                        <label for="firstName" class="form-label">სახელი</label>
                        <input formControlName="firstName" type="text" class="form-control" id="firstName"
                            placeholder="შეიყვანეთ სახელი" required [class.is-invalid]="isInvalid('firstName')">
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">გვარი</label>
                        <input formControlName="lastName" type="text" class="form-control" id="lastName"
                            placeholder="შეიყვანეთ გვარი" required [class.is-invalid]="isInvalid('lastName')">
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label">ელ-ფოსტა</label>
                        <input formControlName="email" type="email" class="form-control" id="regEmail"
                            placeholder="შეიყვანეთ ელ-ფოსტა" required [class.is-invalid]="isInvalid('email')">
                    </div>
    
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">პაროლი</label>
                        <input formControlName="password" type="password" class="form-control" id="regPassword"
                            placeholder="შეიყვანეთ პაროლი" required [class.is-invalid]="isInvalid('password')">
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">გაიმეორე პაროლი</label>
                        <input formControlName="confirmPassword" type="password" class="form-control" id="confirmPassword"
                            placeholder="შეიყვანეთ გაიმეორე პაროლი" required [class.is-invalid]="isInvalid('confirmPassword')">
                    </div>
    
                    <button type="button" (click)="register()" class="btn btn-primary btn-login mt-4">რეგისტრაცია</button>
    
    
                    <div class="divider">
                        <span>OR</span>
                    </div>
    
                    <div class="signup-link">
                        დაბრუნდი <a (click)="modeChanger()">ავტორიზაციაზე</a>
                    </div>
                </form>
            }
            
        </div>
    </div>
</div>
