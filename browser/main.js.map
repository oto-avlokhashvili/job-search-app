@if (loading()) {
  <div class="overlay">
    <div class="scene">
      <div class="stars" #starsContainer></div>

      <div class="rocket-wrap">
        <svg width="60" height="100" viewBox="0 0 60 100" fill="none">
          <path d="M30 4 C30 4 14 28 14 60 L46 60 C46 28 30 4 30 4Z" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
          <path d="M30 4 C30 4 22 24 22 48 L38 48 C38 24 30 4 30 4Z" fill="white" opacity="0.25"/>
          <ellipse cx="30" cy="42" rx="8" ry="8" fill="#0C447C" stroke="#378ADD" stroke-width="1"/>
          <ellipse cx="30" cy="42" rx="5" ry="5" fill="#B5D4F4" opacity="0.6"/>
          <path d="M14 60 L4 78 L22 70 Z" fill="#185FA5" stroke="#378ADD" stroke-width="0.8"/>
          <path d="M46 60 L56 78 L38 70 Z" fill="#185FA5" stroke="#378ADD" stroke-width="0.8"/>
          <rect x="24" y="60" width="12" height="8" rx="1" fill="#0C447C"/>
        </svg>

        <div class="flame-group">
          <div class="flame l"></div>
          <div class="flame c"></div>
          <div class="flame r"></div>
        </div>

        <div class="smoke">
          <div class="puff" *ngFor="let p of [0,1,2,3]"></div>
        </div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status">{{ statusMessage() }}</div>
    </div>
  </div>
}
