<div class="login-page">
    <!-- Theme Toggle -->
    <button class="auth-theme-toggle" (click)="themeService.toggle()" title="Toggle theme">
        {{ themeService.isDarkMode() ? '☀️' : '🌙' }}
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <img [src]="themeService.isDarkMode() ? '/icons/logo-dark.png' : '/icons/logo-light.png'" alt="Job Scout Logo" class="auth-logo">
                    <span class="logo-text">Job Scout</span>
                </div>
                <h2>გამარჯობა</h2>
                <p>შედით თქვენს ანგარიშზე გასაგრძელებლად</p>
            </div>
            @if(loginMode()){

            <form class="login-form" [formGroup]="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">ელ-ფოსტა</label>
                    <input formControlName="email" type="email" class="form-control" id="email"
                        placeholder="შეიყვანეთ ელ-ფოსტა" required [class.is-invalid]="isInvalid('email')">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">პაროლი</label>
                    <input formControlName="password" type="password" class="form-control" id="password"
                        placeholder="შეიყვანეთ პაროლი" required [class.is-invalid]="isInvalid('password')">
                </div>

                <button type="button" (click)="logIn()" class="btn btn-primary btn-login mt-3">შესვლა</button>

                <div class="divider">
                    <span>OR</span>
                </div>
                <button type="button" (click)="signInWithGoogle()" class="btn btn-google mt-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Google-ით შესვლა
                </button>
                <div class="signup-link mt-4">
                    არ გაქვს ანგარიში? <a (click)="modeChanger()">რეგისტრაცია</a>
                </div>
            </form>
            }@else{
            <form class="login-form" [formGroup]="registerForm">
                <div class="mb-3">
                    <label for="firstName" class="form-label">სახელი</label>
                    <input formControlName="firstName" type="text" class="form-control" id="firstName"
                        placeholder="შეიყვანეთ სახელი" required [class.is-invalid]="isInvalid('firstName')">
                </div>
                <div class="mb-3">
                    <label for="lastName" class="form-label">გვარი</label>
                    <input formControlName="lastName" type="text" class="form-control" id="lastName"
                        placeholder="შეიყვანეთ გვარი" required [class.is-invalid]="isInvalid('lastName')">
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">ელ-ფოსტა</label>
                    <input formControlName="email" type="email" class="form-control" id="regEmail"
                        placeholder="შეიყვანეთ ელ-ფოსტა" required [class.is-invalid]="isInvalid('email')">
                </div>

                <div class="mb-3">
                    <label for="regPassword" class="form-label">პაროლი</label>
                    <input formControlName="password" type="password" class="form-control" id="regPassword"
                        placeholder="შეიყვანეთ პაროლი" required [class.is-invalid]="isInvalid('password')">
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">გაიმეორე პაროლი</label>
                    <input formControlName="confirmPassword" type="password" class="form-control" id="confirmPassword"
                        placeholder="შეიყვანეთ გაიმეორე პაროლი" required
                        [class.is-invalid]="isInvalid('confirmPassword')">
                </div>

                <button type="button" (click)="register()" class="btn btn-primary btn-login mt-3">რეგისტრაცია</button>


                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="signup-link">
                    დაბრუნდი <a (click)="modeChanger()">ავტორიზაციაზე</a>
                </div>
            </form>
            }

        </div>
    </div>
</div>
